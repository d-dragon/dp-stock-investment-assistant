## 2. GET /sessions/{session_id}/conversation

Retrieve conversation metadata for a session.

### Request

```yaml
GET /api/sessions/a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789/conversation
Authorization: Bearer {token}
```

### Response (200 OK)

```yaml
Content-Type: application/json

{
    "session_id": "a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789",
    "status": "active",
    "message_count": 5,
    "total_tokens": 1250,
    "summary": null,
    "focused_symbols": ["AAPL", "MSFT"],
    "session_assumptions": "I prefer value stocks with dividends",
    "pinned_intent": "Dividend growth investing",
    "last_activity_at": "2025-01-27T10:30:00Z",
    "created_at": "2025-01-27T10:00:00Z",
    "updated_at": "2025-01-27T10:30:00Z",
    "archived_at": null
}
```

#### Response Schema

```yaml
type: object
required:
  - session_id
  - status
  - message_count
  - created_at
  - updated_at
properties:
  session_id:
    type: string
    format: uuid
  status:
    type: string
    enum: [active, summarized, archived]
  message_count:
    type: integer
    minimum: 0
  total_tokens:
    type: integer
    minimum: 0
  summary:
    type: string
    maxLength: 500
    nullable: true
  focused_symbols:
    type: array
    items:
      type: string
      pattern: "^[A-Z]{1,5}$"
  session_assumptions:
    type: string
    nullable: true
  pinned_intent:
    type: string
    nullable: true
  last_activity_at:
    type: string
    format: date-time
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
  archived_at:
    type: string
    format: date-time
    nullable: true
```

### Error Responses

- `403 Forbidden` — User not authorized to access session
- `404 Not Found` — Session or conversation not found

