## WebSocket Events

### Event: `chat_message` (Client → Server)

```yaml
event: chat_message
data:
  message: "What is AAPL's P/E ratio?"
  session_id: "a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789"  # Optional
```

### Event: `chat_response` (Server → Client)

```yaml
event: chat_response
data:
  response: "Apple Inc. (AAPL) has a P/E ratio..."
  session_id: "a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789"
  conversation:
    message_count: 3
    status: "active"
```

### Event: `chat_chunk` (Server → Client, Streaming)

```yaml
event: chat_chunk
data:
  chunk: "Apple Inc."
  done: false
  session_id: "a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789"
```

### Event: `chat_stream_end` (Server → Client)

```yaml
event: chat_stream_end
data:
  session_id: "a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789"
  conversation:
    message_count: 3
    status: "active"
    focused_symbols: ["AAPL"]
```

### Event: `error` (Server → Client)

```yaml
event: error
data:
  code: "CONVERSATION_ARCHIVED"
  message: "Conversation is archived and read-only"
```

---

## Error Codes

| Code | HTTP Status | Description |
|------|-------------|-------------|
| `VALIDATION_ERROR` | 400 | Invalid request payload |
| `INVALID_SESSION_ID` | 400 | Session ID not valid UUID |
| `UNAUTHORIZED` | 401 | Missing/invalid authentication |
| `FORBIDDEN` | 403 | User not authorized for resource |
| `SESSION_NOT_FOUND` | 404 | Session does not exist |
| `CONVERSATION_NOT_FOUND` | 404 | No conversation for session |
| `CONVERSATION_ARCHIVED` | 409 | Conversation is read-only |
| `SERVICE_UNAVAILABLE` | 503 | Agent/database unavailable |

