## 3. GET /sessions/{session_id}/messages

Retrieve message history for a conversation.

### Request

```yaml
GET /api/sessions/a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789/messages
Authorization: Bearer {token}
```

#### Query Parameters

```yaml
limit:
  type: integer
  default: 50
  maximum: 100
  description: Maximum messages to return
offset:
  type: integer
  default: 0
  description: Pagination offset
```

### Response (200 OK)

```yaml
Content-Type: application/json

{
    "session_id": "a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789",
    "messages": [
        {
            "role": "human",
            "content": "Tell me about AAPL",
            "timestamp": "2025-01-27T10:00:00Z"
        },
        {
            "role": "ai",
            "content": "Apple Inc. (AAPL) is a technology company...",
            "timestamp": "2025-01-27T10:00:05Z"
        },
        {
            "role": "human",
            "content": "What is its P/E ratio?",
            "timestamp": "2025-01-27T10:05:00Z"
        },
        {
            "role": "ai",
            "content": "AAPL's P/E ratio is approximately 28.5...",
            "timestamp": "2025-01-27T10:05:03Z"
        }
    ],
    "total_count": 4,
    "has_summary": false,
    "summary": null
}
```

#### Response Schema

```yaml
type: object
required:
  - session_id
  - messages
  - total_count
properties:
  session_id:
    type: string
    format: uuid
  messages:
    type: array
    items:
      type: object
      required:
        - role
        - content
        - timestamp
      properties:
        role:
          type: string
          enum: [human, ai, system]
        content:
          type: string
        timestamp:
          type: string
          format: date-time
  total_count:
    type: integer
    minimum: 0
  has_summary:
    type: boolean
  summary:
    type: string
    nullable: true
    description: Summary of older messages if conversation was summarized
```

