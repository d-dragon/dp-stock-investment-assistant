## 4. POST /sessions/{session_id}/conversation/archive

Manually archive a conversation (mark as read-only).

### Request

```yaml
POST /api/sessions/a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789/conversation/archive
Authorization: Bearer {token}
```

### Response (200 OK)

```yaml
Content-Type: application/json

{
    "session_id": "a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789",
    "status": "archived",
    "archived_at": "2025-01-27T12:00:00Z",
    "message": "Conversation archived successfully"
}
```

### Error Responses

- `403 Forbidden` — User not authorized
- `404 Not Found` — Session/conversation not found
- `409 Conflict` — Already archived

