# API Contract: FR-3.1 Short-Term Memory

**Date**: 2025-01-27 | **Version**: 1.0.0 | **Plan**: [../plan.md](../plan.md)

---

## Base URL

```
/api
```

---

## Endpoints Overview

| Method | Path | Description | Auth |
|--------|------|-------------|------|
| `POST` | `/chat` | Send chat message (optionally with session_id) | Required |
| `GET` | `/sessions/{session_id}/conversation` | Get conversation metadata | Required |
| `GET` | `/sessions/{session_id}/messages` | Get message history | Required |
| `POST` | `/sessions/{session_id}/conversation/archive` | Archive conversation | Required |

---

## 1. POST /chat

Send a chat message to the AI agent. **Backward compatible** — works with or without `session_id`.

### Request

```yaml
POST /api/chat
Content-Type: application/json
Authorization: Bearer {token}

{
    "message": "What is AAPL's P/E ratio?",
    "session_id": "a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789",  # Optional
    "provider": "openai"  # Optional, default from config
}
```

#### Request Schema

```yaml
type: object
required:
  - message
properties:
  message:
    type: string
    minLength: 1
    maxLength: 10000
    description: User message text
  session_id:
    type: string
    format: uuid
    nullable: true
    description: |
      Session ID for conversation continuity.
      - If provided: Load conversation context, persist state
      - If omitted/null: Stateless single-turn, no persistence
  provider:
    type: string
    enum: [openai, grok]
    default: openai
    description: AI model provider
```

### Response (200 OK)

```yaml
Content-Type: application/json

{
    "response": "Apple Inc. (AAPL) has a P/E ratio of approximately 28.5...",
    "provider": "openai",
    "model": "gpt-4",
    "session_id": "a1b2c3d4-e5f6-4789-a0b1-c2d3e4f56789",
    "conversation": {
        "message_count": 3,
        "status": "active",
        "focused_symbols": ["AAPL"]
    }
}
```

#### Response Schema (with session_id)

```yaml
type: object
required:
  - response
  - provider
  - model
properties:
  response:
    type: string
    description: AI assistant response text
  provider:
    type: string
    description: Model provider used
  model:
    type: string
    description: Specific model name
  session_id:
    type: string
    format: uuid
    nullable: true
    description: Echoed session_id (null if stateless)
  conversation:
    type: object
    nullable: true
    description: Conversation metadata (null if stateless)
    properties:
      message_count:
        type: integer
        minimum: 0
      status:
        type: string
        enum: [active, summarized, archived]
      focused_symbols:
        type: array
        items:
          type: string
          pattern: "^[A-Z]{1,5}$"
```

### Error Responses

#### 400 Bad Request (Invalid Input)

```yaml
{
    "error": "Validation error",
    "details": {
        "message": "Message is required",
        "session_id": "Invalid UUID format"
    }
}
```

#### 403 Forbidden (Unauthorized Access)

```yaml
{
    "error": "Access denied",
    "message": "Session does not belong to authenticated user"
}
```

#### 404 Not Found (Session Not Found)

```yaml
{
    "error": "Not found",
    "message": "Session 'a1b2c3d4-...' not found"
}
```

#### 409 Conflict (Archived Conversation)

```yaml
{
    "error": "Conflict",
    "message": "Conversation is archived and read-only"
}
```

#### 503 Service Unavailable

```yaml
{
    "error": "Service unavailable",
    "message": "AI agent service is not available"
}
```

