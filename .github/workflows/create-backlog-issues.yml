          # ────────────────────────────────────────────
          create_issue \
            "[Security] Add JWT authentication to all API routes" \
            "## Summary
          All API endpoints are currently unauthenticated. Any client that can reach the server
          can issue LLM queries and access user data, incurring costs and exposing sensitive information.

          ## Recommended Implementation
          \`\`\`python
          from functools import wraps
          import jwt

          def require_auth(f):
              @wraps(f)
              def decorated(*args, **kwargs):
                  token = request.headers.get('Authorization', '').removeprefix('Bearer ')
                  if not token:
                      return jsonify({'error': 'Authentication required'}), 401
                  try:
                      payload = jwt.decode(
                          token,
                          current_app.config['JWT_SECRET'],
                          algorithms=['HS256']
                      )
                      g.user_id = payload['sub']
                  except jwt.ExpiredSignatureError:
                      return jsonify({'error': 'Token expired'}), 401
                  except jwt.InvalidTokenError:
                      return jsonify({'error': 'Invalid token'}), 401
                  return f(*args, **kwargs)
              return decorated
          \`\`\`

          ## Acceptance Criteria
          - [ ] JWT middleware applied to all non-health routes
          - [ ] \`POST /api/auth/login\` endpoint issues signed tokens
          - [ ] \`JWT_SECRET\` loaded from env var (min 32 chars)
          - [ ] Token expiry configurable (default: 24h)
          - [ ] 401 responses have consistent JSON format
          - [ ] Tests cover authenticated and unauthenticated request scenarios

          ## References
          > docs/architecture-review.md — §8.1 Security Assessment, §11 Phase 3" \
            "phase: 3 - api-agent,security,backlog"

          # ────────────────────────────────────────────
          create_issue \
            "[API] Add /api/v1/ versioning prefix to all routes" \
            "## Summary
          All routes use \`/api/\` with no version. When breaking changes are needed, this prevents
          backward compatibility without impacting all consumers.

          ## Recommended Implementation
          \`\`\`python
          # Register blueprints with versioned prefix
          app.register_blueprint(chat_bp, url_prefix='/api/v1')
          app.register_blueprint(models_bp, url_prefix='/api/v1')

          # Backward compat: redirect /api/ to /api/v1/ with deprecation header
          @app.route('/api/chat', methods=['POST'])
          def chat_compat():
              response = make_response(redirect('/api/v1/chat', code=308))
              response.headers['Deprecation'] = 'true'
              return response
          \`\`\`

          ## Acceptance Criteria
          - [ ] All routes accessible under \`/api/v1/\` prefix
          - [ ] Old \`/api/\` paths return 308 redirect with \`Deprecation: true\` header
          - [ ] \`docs/openapi.yaml\` updated with \`/api/v1/\` paths
          - [ ] Frontend \`config.ts\` updated to use versioned endpoints

          ## References
          > docs/architecture-review.md — §4.6 Backend Issues" \
            "phase: 3 - api-agent,backlog"

          # ────────────────────────────────────────────
          create_issue \
            "[Observability] Add X-Request-ID header tracing across all API requests" \
            "## Summary
          Without request IDs, correlating logs across Flask, LangGraph, tools, and MongoDB for a
          single user request is difficult. \`X-Request-ID\` makes distributed debugging significantly easier.

          ## Implementation
          \`\`\`python
          import uuid
          from flask import g, request

          @app.before_request
          def set_request_id():
              g.request_id = request.headers.get('X-Request-ID') or str(uuid.uuid4())

          @app.after_request
          def add_request_id_header(response):
              response.headers['X-Request-ID'] = g.get('request_id', '')
              return response

          # In logging:
          logger.info('Processing chat', extra={'request_id': g.request_id, 'user_id': user_id})
          \`\`\`

          ## Acceptance Criteria
          - [ ] Every request assigned a UUID request ID (client-provided or generated)
          - [ ] All responses include \`X-Request-ID\` header
          - [ ] All log lines include \`request_id\` field
          - [ ] Agent and tool logs propagate the same ID

          ## References
          > docs/architecture-review.md — §4.6 Backend Issues" \
            "phase: 3 - api-agent,observability,backlog"

          # ────────────────────────────────────────────
          create_issue \
            "[Agent] Expand LangGraph agent toolset with News, Screener, and Portfolio tools" \
            "## Summary
          The agent currently has only 2 active tools (\`StockSymbolTool\`, \`ReportingTool\`).
          A richer toolset enables comprehensive investment analysis.

          ## Proposed New Tools
          | Tool | Description | Cache TTL |
          |------|-------------|-----------|
          | \`NewsSearchTool\` | Recent news for a symbol | 5 min |
          | \`ScreenerTool\` | Filter stocks by criteria (P/E, market cap) | 15 min |
          | \`PortfolioAnalysisTool\` | Analyze holdings list | 10 min |
          | \`EarningsCalendarTool\` | Upcoming earnings dates | 1 hour |
          | \`SectorComparisonTool\` | Compare stock to sector peers | 15 min |

          ## Implementation Pattern
          \`\`\`python
          # src/core/tools/news_search.py
          class NewsSearchTool(CachingTool):
              name = 'news_search'
              description = 'Fetch recent news articles for a given stock symbol'
              cache_ttl = 300

              def _run(self, symbol: str) -> str:
                  news = self.data_manager.fetch_news(symbol)
                  return json.dumps(news[:5])
          \`\`\`

          ## Acceptance Criteria
          - [ ] At least 3 new tools implemented and registered in \`ToolRegistry\`
          - [ ] Each tool has TTL-based Redis caching
          - [ ] Each tool has unit tests with mocked data sources
          - [ ] Agent system prompt updated to describe new tools
          - [ ] Integration test verifies agent selects new tools for relevant queries

          ## References
          > docs/architecture-review.md — §5.7 Agent Improvement Areas" \
            "phase: 3 - api-agent,agent,backlog"

          # ────────────────────────────────────────────
          create_issue \
            "[Observability] Add Prometheus metrics endpoint to Flask API" \
            "## Summary
          The API exposes no metrics. Adding Prometheus metrics enables SLA monitoring,
          cost alerting, and capacity planning.

          ## Implementation
          \`\`\`python
          from prometheus_flask_exporter import PrometheusMetrics
          from prometheus_client import Counter, Histogram

          metrics = PrometheusMetrics(app)

          chat_requests = Counter('chat_requests_total', 'Total chat requests',
                                  ['provider', 'fallback', 'status'])
          llm_latency   = Histogram('llm_response_seconds', 'LLM response latency',
                                    ['provider'], buckets=[0.5,1,2,5,10,30,60])
          \`\`\`

          ## Metrics Target
          | Metric | Type | Labels |
          |--------|------|--------|
          | \`chat_requests_total\` | Counter | provider, fallback, status |
          | \`llm_response_seconds\` | Histogram | provider |
          | \`tool_cache_hits_total\` | Counter | tool_name |
          | \`active_sessions_gauge\` | Gauge | — |

          ## Acceptance Criteria
          - [ ] \`prometheus-flask-exporter\` in \`requirements.txt\`
          - [ ] \`GET /metrics\` endpoint exposed (protected in production)
          - [ ] At least 4 custom metrics instrumented
          - [ ] Helm chart includes \`ServiceMonitor\` CRD for Prometheus scraping

          ## References
          > docs/architecture-review.md — §8.2 Observability Stack" \
            "phase: 3 - api-agent,observability,backlog"

          # ────────────────────────────────────────────
          create_issue \
            "[Observability] Add OpenTelemetry distributed tracing" \
            "## Summary
          LangSmith captures LLM call traces but the broader request lifecycle
          (HTTP → Flask → LangGraph → tools → MongoDB) is not traced.
          OpenTelemetry provides end-to-end distributed tracing.

          ## Implementation
          \`\`\`python
          from opentelemetry.instrumentation.flask import FlaskInstrumentor
          from opentelemetry.instrumentation.pymongo import PymongoInstrumentor
          from opentelemetry.exporter.otlp.proto.grpc.trace_exporter import OTLPSpanExporter
          from opentelemetry.sdk.trace import TracerProvider
          from opentelemetry.sdk.trace.export import BatchSpanProcessor

          provider = TracerProvider()
          provider.add_span_processor(BatchSpanProcessor(OTLPSpanExporter()))
          trace.set_tracer_provider(provider)

          FlaskInstrumentor().instrument_app(app)
          PymongoInstrumentor().instrument()
          \`\`\`

          ## Acceptance Criteria
          - [ ] \`opentelemetry-sdk\`, Flask + PyMongo instrumentors in \`requirements.txt\`
          - [ ] Flask requests auto-traced (HTTP method, route, status code)
          - [ ] MongoDB operations traced
          - [ ] OTLP exporter endpoint configurable via \`OTEL_EXPORTER_OTLP_ENDPOINT\` env var
          - [ ] Custom span added for each LLM call (provider, model, latency)

          ## References
          > docs/architecture-review.md — §8.2 Observability Stack" \
            "phase: 3 - api-agent,observability,backlog"

          # ────────────────────────────────────────────
          create_issue \
            "[Testing] Add E2E tests with Playwright for critical user flows" \
            "## Summary
          There are currently no end-to-end tests. Critical flows (send message, receive streaming
          response, cancel streaming, model selection) are not regression-tested.

          ## Test Scenarios
          \`\`\`typescript
          // tests/e2e/chat.spec.ts
          test('user sends message and receives streaming response', async ({ page }) => {
            await page.goto('http://localhost:3000');
            await page.fill('textarea', 'What is the current price of AAPL?');
            await page.keyboard.press('Enter');
            await expect(page.locator('.assistant-message').last()).toBeVisible();
            await expect(page.locator('.streaming-indicator')).not.toBeVisible({ timeout: 30000 });
            await expect(page.locator('.assistant-message').last()).toContainText(/AAPL|Apple/i);
          });
          \`\`\`

          ## Test Suite Target
          - [ ] \`chat-basic.spec.ts\`: Send message + receive response
          - [ ] \`chat-streaming.spec.ts\`: SSE renders incrementally
          - [ ] \`chat-cancel.spec.ts\`: Cancel button stops stream
          - [ ] \`model-selector.spec.ts\`: Model selection updates active model
          - [ ] \`health.spec.ts\`: Health endpoint returns 200

          ## Acceptance Criteria
          - [ ] Playwright installed and configured
          - [ ] 5+ E2E tests covering the scenarios above
          - [ ] Tests run against local \`docker-compose\` stack
          - [ ] GitHub Actions workflow step added for E2E tests

          ## References
          > docs/architecture-review.md — §8.3 Testing Coverage" \
            "phase: 3 - api-agent,testing,backlog"

