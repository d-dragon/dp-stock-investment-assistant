            "[Security] Enforce Azure Key Vault as mandatory secret store in production" \
            "## Summary
          Azure Key Vault integration exists in \`config_loader.py\` but is disabled by default.
          In production, all secrets (API keys, DB passwords) must come from Key Vault,
          not environment variables.

          ## Recommended Changes
          \`\`\`python
          # config_loader.py — enforce Key Vault in production
          if app_env == 'production' and not use_azure_keyvault:
              raise RuntimeError(
                  'APP_ENV=production requires USE_AZURE_KEYVAULT=true. '
                  'Set AZURE_KEYVAULT_URI and ensure managed identity is assigned.'
              )
          \`\`\`

          \`\`\`hcl
          # IaC/infra/terraform/keyvault.tf
          resource \"azurerm_key_vault\" \"main\" {
            name                       = \"dp-stock-kv-prod\"
            resource_group_name        = azurerm_resource_group.main.name
            tenant_id                  = data.azurerm_client_config.current.tenant_id
            sku_name                   = \"standard\"
            soft_delete_retention_days = 7
          }
          \`\`\`

          ## Acceptance Criteria
