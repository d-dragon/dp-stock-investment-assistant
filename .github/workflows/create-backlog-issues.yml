            "[Scalability] Add Kubernetes HorizontalPodAutoscaler for API pods" \
            "## Summary
          The API deployment has a fixed replica count. Under variable load (market hours, news events),
          the API should auto-scale to handle traffic without manual intervention.

          ## Implementation
          \`\`\`yaml
          # IaC/helm/dp-stock/templates/hpa-api.yaml
          apiVersion: autoscaling/v2
          kind: HorizontalPodAutoscaler
          metadata:
            name: {{ include \"dp-stock.fullname\" . }}-api
          spec:
            scaleTargetRef:
              apiVersion: apps/v1
              kind: Deployment
              name: {{ include \"dp-stock.fullname\" . }}-api
            minReplicas: {{ .Values.api.autoscaling.minReplicas | default 1 }}
            maxReplicas: {{ .Values.api.autoscaling.maxReplicas | default 5 }}
            metrics:
              - type: Resource
                resource:
                  name: cpu
                  target:
                    type: Utilization
                    averageUtilization: 70
          \`\`\`

          ## Acceptance Criteria
          - [ ] HPA Helm template added for API deployment
          - [ ] \`autoscaling.enabled\` flag (default: false in dev, true in production values)
          - [ ] Min/max replicas configurable via \`values.production.yaml\`
          - [ ] CPU and memory resource requests/limits set (required for HPA)

          ## References
          > docs/architecture-review.md — §7.6 Infrastructure Improvements" \
            "phase: 4 - infra,scalability,backlog"

          # ────────────────────────────────────────────
          create_issue \
            "[Security] Add Kubernetes Network Policies to restrict inter-pod traffic" \
            "## Summary
          Without Network Policies, any pod can communicate with any other pod.
          Policies restrict traffic to only expected communication paths.

          ## Policy Design
          \`\`\`yaml
          # Default deny-all ingress
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: default-deny-ingress
          spec:
            podSelector: {}
            policyTypes: [Ingress]
          ---
          # Allow only: API → MongoDB
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: allow-api-to-mongodb
          spec:
            podSelector:
              matchLabels: { app: mongodb }
            ingress:
              - from:
                - podSelector:
                    matchLabels: { app: dp-stock-api }
                ports: [{ port: 27017 }]
          \`\`\`

          ## Acceptance Criteria
          - [ ] Default-deny ingress policy for all namespaced pods
          - [ ] Explicit allow policies: frontend→API, API→MongoDB, API→Redis, API→Agent
          - [ ] Policies added as Helm templates with \`networkPolicy.enabled\` toggle
          - [ ] Verified with \`kubectl exec\` connectivity tests

          ## References
          > docs/architecture-review.md — §7.6 Infrastructure Improvements" \
            "phase: 4 - infra,security,backlog"

          # ────────────────────────────────────────────
          create_issue \
            "[Observability] Add Grafana + Prometheus Helm chart dependencies" \
            "## Summary
          There is no monitoring dashboard for production. Adding kube-prometheus-stack
          as a Helm dependency provides dashboards for API latency, LLM costs, error rates,
          and pod health out of the box.

          ## Implementation
          \`\`\`yaml
