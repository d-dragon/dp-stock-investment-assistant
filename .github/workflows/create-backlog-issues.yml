          dependencies:
            - name: kube-prometheus-stack
              version: \"~65.x\"
              repository: https://prometheus-community.github.io/helm-charts
              condition: monitoring.enabled
          \`\`\`

          ## Dashboard Panels (Target)
          - API request rate + p50/p95 latency
          - LLM call count and latency by provider
          - Chat requests with/without fallback
          - Pod CPU/memory usage
          - MongoDB connection pool
          - Redis cache hit rate

          ## Acceptance Criteria
          - [ ] \`kube-prometheus-stack\` added as optional Helm dependency
          - [ ] \`ServiceMonitor\` for API scraping included
          - [ ] Grafana dashboard JSON provisioned via ConfigMap
          - [ ] \`monitoring.enabled: false\` toggle in \`values.yaml\`, true in production
          - [ ] **Depends on**: Prometheus metrics issue

          ## References
          > docs/architecture-review.md — §7.6 Infrastructure Improvements" \
            "phase: 4 - infra,observability,deployment,backlog"

          # ────────────────────────────────────────────
          create_issue \
            "[Availability] Add Kubernetes PodDisruptionBudget for zero-downtime deployments" \
            "## Summary
          Without a PodDisruptionBudget, rolling updates or node drains could take all API pods
          offline simultaneously. A PDB ensures at least one pod remains available at all times.

          ## Implementation
          \`\`\`yaml
          # IaC/helm/dp-stock/templates/pdb-api.yaml
          apiVersion: policy/v1
          kind: PodDisruptionBudget
          metadata:
            name: {{ include \"dp-stock.fullname\" . }}-api
          spec:
            minAvailable: 1
            selector:
              matchLabels:
                {{- include \"dp-stock.selectorLabels\" . | nindent 6 }}
                app.kubernetes.io/component: api
          \`\`\`

          ## Acceptance Criteria
          - [ ] PDB template added to Helm chart for API and Agent deployments
          - [ ] \`minAvailable: 1\` configured (or 50% for multi-replica production)
          - [ ] Verified: \`kubectl drain\` leaves ≥1 API pod running

          ## References
          > docs/architecture-review.md — §7.6 Infrastructure Improvements" \
            "phase: 4 - infra,scalability,backlog"

          # ────────────────────────────────────────────
          create_issue \
            "[Supply Chain] Add container image signing with Cosign" \
            "## Summary
          Container images are pushed to ACR without cryptographic signatures.
          Cosign provides image provenance verification: only images signed by the CI pipeline
          can be deployed, protecting against supply chain attacks.

          ## Implementation
          \`\`\`yaml
          # In .github/workflows/build-push-images.yml
          - name: Install Cosign
            uses: sigstore/cosign-installer@v3

          - name: Sign image (keyless via GitHub OIDC)
            run: |
              cosign sign --yes \\
                \${{ env.REGISTRY }}/\${{ env.IMAGE_NAME }}@\${{ steps.build.outputs.digest }}
            env:
              COSIGN_EXPERIMENTAL: '1'

          - name: Verify image before deploy
            run: cosign verify \${{ env.REGISTRY }}/\${{ env.IMAGE_NAME }}@\${{ steps.build.outputs.digest }}
          \`\`\`

          ## Acceptance Criteria
          - [ ] Cosign installed in CI build workflow
          - [ ] All images signed after push (keyless, via GitHub OIDC)
          - [ ] Verify step added before Helm deploy job
          - [ ] Kyverno/OPA Gatekeeper policy enforces signed images in production namespace

          ## References
          > docs/architecture-review.md — §7.6 Infrastructure Improvements" \
            "phase: 4 - infra,supply-chain,deployment,backlog"

