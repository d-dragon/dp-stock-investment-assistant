installed:
- agent-context
- arch
- architecture-guard
- companion
- doc-sync
- harness
- memory-loader
- security-review
settings:
  auto_execute_hooks: true
hooks:
  after_tasks:
  - extension: understanding
    command: speckit.understanding.validate
    enabled: true
    optional: true
    prompt: Run requirements quality validation on the spec?
    description: Validate spec quality after task breakdown
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit task changes?
    description: Auto-commit after task generation
    condition: null
  - extension: fleet
    command: speckit.fleet.review
    enabled: true
    optional: true
    prompt: Run cross-model review to evaluate plan and tasks before implementation?
    description: Pre-implementation review gate
    condition: null
  - extension: security-review
    command: speckit.security-review.tasks
    enabled: true
    optional: true
    priority: 10
    prompt: Would you like to verify that security boundaries are represented in the
      tasks?
    description: ''
    condition: null
  - extension: architecture-guard
    command: speckit.architecture-guard.refactor-generator
    enabled: true
    optional: true
    priority: 10
    prompt: Would you like to generate architectural refactor tasks before implementation?
    description: ''
    condition: null
  - extension: companion
    command: speckit.companion.capture-tasks
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.companion.capture-tasks?
    description: Record tasks completion (currentStep=tasks, status=ready-to-implement)
      into .spec-context.json
    condition: null
  after_implement:
  - extension: doc-sync
    command: speckit.doc-sync.gate
    enabled: true
    optional: false
    priority: 5
    prompt: Run implementation document-spec sync gate before verification?
    description: Refresh traceability reports from implementation evidence before
      verification
    condition: null
  - extension: verify-tasks
    command: speckit.verify-tasks.run
    enabled: true
    optional: true
    prompt: Run verify-tasks in a fresh session to check for phantom completions
    description: Post-implementation phantom completion detector
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit implementation changes?
    description: Auto-commit after implementation
    condition: null
  - extension: verify
    command: speckit.verify.run
    enabled: true
    optional: true
    prompt: Run verify to validate implementation against specification?
    description: Post-implementation verification gate
    condition: null
  - extension: doc-sync
    command: speckit.doc-sync.gate
    enabled: true
    optional: false
    priority: 50
    prompt: Run final document-spec sync gate after verification?
    description: Final hard sync gate before treating a feature as Verified
    condition: null
  - extension: security-review
    command: speckit.security-review.branch
    enabled: true
    optional: true
    priority: 60
    prompt: Would you like to scan the new implementation for security vulnerabilities?
    description: ''
    condition: null
  - extension: architecture-guard
    command: speckit.architecture-guard.architecture-review
    enabled: true
    optional: true
    priority: 70
    prompt: Would you like to run a post-implementation architecture review?
    description: ''
    condition: null
  - extension: companion
    command: speckit.companion.capture-implement
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.companion.capture-implement?
    description: Per-task journaling on implement (currentStep=implement; status=implemented
      when all tasks checked)
    condition: null
  after_specify:
  - extension: speckit-utils
    command: speckit.speckit-utils.doctor
    enabled: true
    optional: true
    prompt: Run project health check?
    description: Validate project health after specification generation
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  - extension: harness
    command: speckit.harness.init
    enabled: true
    optional: true
    priority: 10
    prompt: Set up a state-externalized research harness for this feature?
    description: Initialize harness state after specification
    condition: null
  - extension: companion
    command: speckit.companion.capture
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.companion.capture?
    description: Record specify completion (currentStep=specify, status=specified)
      into .spec-context.json
    condition: null
  after_plan:
  - extension: speckit-utils
    command: speckit.speckit-utils.validate
    enabled: true
    optional: true
    prompt: Validate spec-to-task traceability?
    description: Verify requirements map to planned tasks after planning
    condition: null
  - extension: doc-sync
    command: speckit.doc-sync.gate
    enabled: true
    optional: false
    priority: 10
    prompt: Run document-spec sync gate after planning?
    description: Validate planned SRS mappings and sync reports before task generation
    condition: null
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after planning
    condition: null
  - extension: harness
    command: speckit.harness.verify
    enabled: true
    optional: true
    priority: 10
    prompt: Verify plan claims against primary sources and the harness evidence base?
    description: Run claim verification after planning
    condition: null
  - extension: security-review
    command: speckit.security-review.plan
    enabled: true
    optional: true
    priority: 10
    prompt: Would you like to perform a security review on the proposed technical
      plan?
    description: ''
    condition: null
  - extension: architecture-guard
    command: speckit.architecture-guard.violation-detection
    enabled: true
    optional: true
    priority: 10
    prompt: Would you like to scan the technical plan for architectural drift and
      Constitution violations?
    description: ''
    condition: null
  - extension: companion
    command: speckit.companion.capture-plan
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.companion.capture-plan?
    description: Record plan completion (currentStep=plan, status=planned) into .spec-context.json
    condition: null
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before specification
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before clarification
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before planning
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before task generation
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before implementation
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  - extension: memory-loader
    command: speckit.memory-loader.load
    enabled: true
    optional: false
    prompt: Execute speckit.memory-loader.load?
    description: Load project memory files before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit clarification changes?
    description: Auto-commit after spec clarification
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
