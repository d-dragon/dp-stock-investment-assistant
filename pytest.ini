[pytest]
markers =
    performance: marks tests as performance benchmarks (deselect with '-m "not performance"')
    asyncio: marks coroutine tests to run through the project-local asyncio pytest hook
    slow: marks slower tests that may require model or integration access

# NFR-6.1.3 coverage-baseline non-regression (soft gate).
# Run with: pytest tests/ --cov=src --cov-fail-under=56 -q
