app:
  log_level: "DEBUG"
model:
  debug_prompt: true
langchain:
  tracing:
    enabled: true  # Enable Studio for local development
database:
  mongodb:
    enabled: true
    connection_string: "mongodb://stockadmin:stockpassword@localhost:27017/stock_assistant?authSource=stock_assistant&retryWrites=true&w=majority"
    database_name: "stock_assistant"
  redis:
    enabled: true
    host: "localhost"
    port: 6379
    db: 0
    password: "secret"

# Prompt System Configuration (M1 — Prompt Runtime Parity)
# Controls prompt asset resolution, selection mode, and version management.
# See specs/prompt-system-milestone1/spec.md for full specification.
prompts:
  registry:
    directory: "src/prompts"
    refresh_window_seconds: 300
  system:
    active_role: "react_analyst"
    active_version: "1.0.0"
    variants:
      - name: "baseline"
        version: "1.0.0"
        file: "system/react_analyst.md"
        status: "active"
  selection_mode: "fixed"
  default_locale: "en"
  experiments:
    enabled: false
    active_id: null
